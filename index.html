<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1e3a8a">
    <title>Inventário Musical</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-lg relative">
        <header class="bg-blue-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-lg font-bold">🎵 Inventário</h1>
            <div class="flex gap-2">
                <button onclick="app.navigate('scanner')" class="p-2 bg-blue-700 rounded"></button>
                <button id="btn-login-toggle" onclick="app.toggleLogin()" class="p-2 bg-blue-700 rounded"></button>
                <button id="btn-user-management" onclick="app.openUserManagement()" class="p-2 bg-blue-700 rounded hidden">👥</button>
            </div>
        </header>

        <main class="p-4 pb-20">
            <section id="view-dashboard" class="view">
                <h2 class="text-xl font-bold mb-4">Dashboard</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-blue-100 p-4 rounded-lg text-center"><p class="text-2xl font-bold" id="dash-total">0</p><p class="text-sm">Total</p></div>
                    <div class="bg-yellow-100 p-4 rounded-lg text-center"><p class="text-2xl font-bold" id="dash-emprestados">0</p><p class="text-sm">Emprestados</p></div>
                    <div class="bg-red-100 p-4 rounded-lg text-center"><p class="text-2xl font-bold" id="dash-manutencao">0</p><p class="text-sm">Manutenção</p></div>
                    <div class="bg-green-100 p-4 rounded-lg text-center"><p class="text-2xl font-bold" id="dash-ativos">0</p><p class="text-sm">Ativos</p></div>
                </div>
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-input" placeholder="Buscar..." class="flex-1 p-2 border rounded" oninput="app.filterItems()">
                    <button onclick="app.exportCSV()" class="bg-green-600 text-white p-2 rounded text-sm">CSV</button>
                    <button onclick="app.exportPDF()" class="bg-red-600 text-white p-2 rounded text-sm">PDF</button>
                </div>

                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="app.navigate('add')" class="bg-blue-600 text-white p-3 rounded-lg font-bold">+ Novo Item</button>
                    <button onclick="app.printLabels()" class="bg-purple-600 text-white p-3 rounded-lg font-bold">🖨️ Etiquetas</button>
                </div>
                
                <div id="items-list" class="space-y-3"></div>
            </section>

            <section id="view-add" class="view hidden">
                <h2 class="text-xl font-bold mb-4">Cadastrar Item</h2>
                <form id="form-add" onsubmit="app.saveItem(event)">
                    <label class="block text-sm font-medium mb-1">Código (Auto)</label>
                    <input type="text" id="item-codigo" class="w-full p-2 border rounded mb-3 bg-gray-100" readonly>
                    <label class="block text-sm font-medium mb-1">Categoria</label>
                    <select id="item-categoria" class="w-full p-2 border rounded mb-3" required>
                        <option value="Instrumento">Instrumento Musical</option>
                        <option value="Eletronico">Eletrônico</option>
                        <option value="Mobiliario">Mobiliário</option>
                        <option value="Acessorio">Acessório</option>
                        <option value="Outro">Outro</option>
                    </select>
                    <label class="block text-sm font-medium mb-1">Descrição</label>
                    <input type="text" id="item-descricao" class="w-full p-2 border rounded mb-3" required>
